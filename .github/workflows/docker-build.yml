name: Build and Scan Postgres pgvector

on:
  schedule:
    - cron: '0 4 * * 0' # Every Sunday at 04:00 AM
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual triggering of the workflow from the GitHub UI
  repository_dispatch:
    types: [webhook-trigger] # This is your custom Webhook event name

permissions:
  contents: write       # Required for the keepalive action to push dummy commits
  packages: write       # Allows pushing images to GitHub Container Registry (GHCR)
  security-events: write # Allows uploading Trivy scan results to the GitHub Security tab

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 1: Build the image locally (do not push yet) so Trivy can scan it
      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: postgres-pgvector:test

      # Step 2: Run Trivy vulnerability scanner
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'postgres-pgvector:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      # Step 3: Upload scan results to GitHub Security (Code Scanning)
      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Always upload reports, even if vulnerabilities are found
        with:
          sarif_file: 'trivy-results.sarif'

      # Step 4: Log in to GHCR (only runs if Trivy finds no breaking vulnerabilities)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 5: Build and push the final image (utilizes the fast cache from step 1)
      - name: Build and Push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:17-alpine

      # Step 6: Keep-Alive (Prevents the 60-day shutdown of GitHub cron jobs)
      - name: Keep Alive Action
        uses: gautamkrishnar/keepalive-workflow@v1
