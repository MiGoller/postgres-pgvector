name: Build and Scan Postgres pgvector

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" # Future-proof: Opt-in to Node 24 to clear deprecation warnings

on:
  schedule:
    - cron: '0 4 * * 0' # Every Sunday at 04:00 AM
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual triggering from the GitHub UI
  repository_dispatch:
    types: [webhook-trigger] # Allows triggering via your private Webhook

permissions:
  contents: write       # Required for the keepalive action to push dummy commits
  packages: write       # Allows pushing images to GitHub Container Registry (GHCR)
  security-events: write # Allows uploading Trivy scan results to the GitHub Security tab

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Fix: Docker registry tags must be strictly lowercase (converts MiGoller to migoller)
      - name: Downcase repository name
        run: |
          echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 1: Build the image locally so Trivy can scan it
      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: postgres-pgvector:test

      # Step 2: Run Trivy vulnerability scanner
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'postgres-pgvector:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      # Step 3: Upload scan results to GitHub Security
      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # Step 4: Log in to GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 5: Build and Push to GHCR (using the lowercase variable)
      - name: Build and Push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LOWERCASE }}:17-alpine

      # Step 6: Keep-Alive
      - name: Keep Alive Action
        uses: gautamkrishnar/keepalive-workflow@v1
