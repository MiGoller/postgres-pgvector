name: Build and Scan Postgres pgvector

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" # Opt-in to Node 24 for future-proofing

on:
  schedule:
    - cron: '0 4 * * 0' # Every Sunday at 04:00 AM
  push:
    branches: [ "main" ]
  workflow_dispatch: 
  repository_dispatch:
    types: [webhook-trigger] 

permissions:
  contents: write       
  packages: write       
  security-events: write 

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase repository name
        run: |
          echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 1: Build the image locally
      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: postgres-pgvector:test

      # Step 2: Run Trivy vulnerability scanner (Pinned to verified stable version)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: 'postgres-pgvector:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      # Step 3: Upload scan results to GitHub Security
      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # Step 4: Log in to GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 5: Build and Push to GHCR
      - name: Build and Push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LOWERCASE }}:17-alpine
